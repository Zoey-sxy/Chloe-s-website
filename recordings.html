<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recordings | Chloe</title>
    <meta
      name="description"
      content="A minimal vertical timeline for quiet personal recordings."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./recordings.css" />
  </head>
  <body>
    <a class="recordings-home-link" href="./index.html" aria-label="Back to homepage">chloe</a>

    <main class="recordings-page">
      <section class="timeline" aria-label="recordings timeline">
        <article class="timeline-entry timeline-entry-left">
          <time class="timeline-date" datetime="2026-03-31">03 / 31</time>
          <div class="timeline-card">
            <span class="timeline-card-shadow" aria-hidden="true"></span>
            <div class="timeline-card-face">
              <p>
                想把记录单独留出来，不解释它是什么，也不把它做成作品集。只是想把最近发生过的、
                想记住的东西慢慢放进来。
              </p>
              <div class="timeline-media timeline-media-double">
                <img src="./assets/designs/hero-building.png" alt="design visual" />
                <img src="./assets/work-01/01.png" alt="work sample" />
              </div>
            </div>
          </div>
        </article>

        <article class="timeline-entry timeline-entry-right">
          <time class="timeline-date" datetime="2026-03-12">03 / 12</time>
          <div class="timeline-card">
            <span class="timeline-card-shadow" aria-hidden="true"></span>
            <div class="timeline-card-face">
              <p>
                最近越来越觉得，过程也值得被留下来。没定稿的时候、反复推翻的时候、只是有一点点雏形的时候，
                其实都很真实。
              </p>
            </div>
          </div>
        </article>

        <article class="timeline-entry timeline-entry-left">
          <time class="timeline-date" datetime="2025-12-24">12 / 24</time>
          <div class="timeline-card">
            <span class="timeline-card-shadow" aria-hidden="true"></span>
            <div class="timeline-card-face">
              <div class="timeline-media timeline-media-triple">
                <img src="./assets/work-02/02.png" alt="visual study 1" />
                <img src="./assets/work-03/03.png" alt="visual study 2" />
                <img src="./assets/work-04/04.png" alt="visual study 3" />
              </div>
              <p>
                收集一些让我想继续做下去的画面。不是为了整理成结论，只是先放在这里。
              </p>
            </div>
          </div>
        </article>

        <article class="timeline-entry timeline-entry-right">
          <time class="timeline-date" datetime="2025-09-05">09 / 05</time>
          <div class="timeline-card">
            <span class="timeline-card-shadow" aria-hidden="true"></span>
            <div class="timeline-card-face">
              <p>
                给自己记一笔。不是因为已经做得很好了，而是因为确实还在往前走。很多时候，“继续做”本身就是一种进展。
              </p>
              <div class="timeline-note">still growing</div>
            </div>
          </div>
        </article>

        <article class="timeline-entry timeline-entry-left">
          <time class="timeline-date" datetime="2019-01-08">2019年1月8日</time>
          <a
            class="timeline-card timeline-card-link"
            href="./recording-2019-01-08.html"
            aria-label="Open 2019-01-08 detail"
            data-gallery-visible="3"
          >
            <span class="timeline-card-shadow" aria-hidden="true"></span>
            <span class="timeline-card-face">
              <div class="timeline-media timeline-media-record">
                <div class="timeline-media-track">
                  <img src="./assets/recordings/2019-01-08/01.png" alt="史密斯住宅模型预览 01" />
                  <img src="./assets/recordings/2019-01-08/02.png" alt="史密斯住宅模型预览 02" />
                  <img src="./assets/recordings/2019-01-08/03.png" alt="史密斯住宅模型预览 03" />
                  <img src="./assets/recordings/2019-01-08/04.png" alt="史密斯住宅模型预览 04" />
                  <img src="./assets/recordings/2019-01-08/05.png" alt="史密斯住宅模型预览 05" />
                  <img src="./assets/recordings/2019-01-08/06.png" alt="史密斯住宅模型预览 06" />
                  <img src="./assets/recordings/2019-01-08/07.png" alt="史密斯住宅模型预览 07" />
                  <img src="./assets/recordings/2019-01-08/08.png" alt="史密斯住宅模型预览 08" />
                  <img src="./assets/recordings/2019-01-08/09.png" alt="史密斯住宅模型预览 09" />
                </div>
              </div>
              <p>
                小组一起通宵熬夜合作做的史密斯住宅，记得最终得分还不低。
              </p>
            </span>
          </a>
        </article>
      </section>
    </main>

    <script src="./recordings.js" defer></script>
  </body>
</html>
